# GitHub Actions Workflow for building and distributing the plugin internally.
# On GitHub Release: builds the plugin, uploads ZIP to release assets,
# and deploys a custom plugin repository to a public distribution repo.
# Requires PLUGIN_DEPLOY_TOKEN secret (classic PAT with repo scope).

name: Release
on:
  release:
    types: [prereleased, released]

jobs:

  release:
    name: Build & Deploy Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      # Set up Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # Set environment variables
      - name: Export Properties
        id: properties
        shell: bash
        run: |
          CHANGELOG="$(cat << 'EOM' | sed -e 's/^[[:space:]]*$//g' -e '/./,$!d'
          ${{ github.event.release.body }}
          EOM
          )"

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          VERSION=$(grep -oP 'pluginVersion=\K.*' gradle.properties)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Update the Unreleased section with the current release note
      - name: Patch Changelog
        if: ${{ steps.properties.outputs.changelog != '' }}
        env:
          CHANGELOG: ${{ steps.properties.outputs.changelog }}
        run: |
          ./gradlew patchChangelog --release-note="$CHANGELOG"

      # Build the plugin
      - name: Build Plugin
        run: ./gradlew buildPlugin

      # Upload artifact as a release asset
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ./build/distributions/* --clobber

      # Find the exact ZIP filename from build output
      - name: Get ZIP filename
        id: zip
        run: |
          ZIP_NAME=$(ls build/distributions/*.zip | head -1 | xargs basename)
          echo "filename=$ZIP_NAME" >> $GITHUB_OUTPUT

      # Deploy plugin ZIP via GitHub Releases and updatePlugins.xml via git
      # to public distribution repo. Uses Releases for the ZIP to avoid
      # GitHub's 100 MB file size limit on regular git objects.
      - name: Deploy to Distribution Repository
        env:
          VERSION: ${{ steps.properties.outputs.version }}
          ZIP_NAME: ${{ steps.zip.outputs.filename }}
          DEPLOY_TOKEN: ${{ secrets.PLUGIN_DEPLOY_TOKEN }}
        run: |
          SINCE_BUILD=$(grep -oP 'pluginSinceBuild=\K.*' gradle.properties)
          UNTIL_BUILD=$(grep -oP 'pluginUntilBuild=\K.*' gradle.properties)
          DIST_REPO="Teknasyon/intellij-ai-plugin-releases"
          RELEASE_TAG="v${VERSION}"

          # Clone the distribution repo (shallow)
          git clone --depth 1 "https://x-access-token:${DEPLOY_TOKEN}@github.com/${DIST_REPO}.git" /tmp/plugin-dist || {
            mkdir -p /tmp/plugin-dist
            cd /tmp/plugin-dist
            git init -b main
            git remote add origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/${DIST_REPO}.git"
          }
          cd /tmp/plugin-dist
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          # Create or update a GitHub Release on the distribution repo
          # and upload the plugin ZIP as a release asset
          GITHUB_TOKEN="${DEPLOY_TOKEN}" gh release delete "${RELEASE_TAG}" \
            --repo "${DIST_REPO}" --yes 2>/dev/null || true
          GITHUB_TOKEN="${DEPLOY_TOKEN}" gh release create "${RELEASE_TAG}" \
            "${GITHUB_WORKSPACE}/build/distributions/${ZIP_NAME}#plugin.zip" \
            --repo "${DIST_REPO}" \
            --title "Plugin ${VERSION}" \
            --notes "Automated release of Teknasyon AI Plugin v${VERSION}"

          # Build the download URL pointing to the release asset
          DOWNLOAD_URL="https://github.com/${DIST_REPO}/releases/download/${RELEASE_TAG}/${ZIP_NAME}"

          # Generate updatePlugins.xml
          cat > /tmp/plugin-dist/updatePlugins.xml << XMLEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plugins>
            <plugin
                id="com.github.teknasyon.plugin"
                url="${DOWNLOAD_URL}"
                version="${VERSION}">
              <name>Teknasyon AI</name>
              <description>Internal Teknasyon AI</description>
              <idea-version since-build="${SINCE_BUILD}" until-build="${UNTIL_BUILD}"/>
            </plugin>
          </plugins>
          XMLEOF

          # Remove plugin.zip from git tracking if it exists from previous runs
          git rm -f plugin.zip 2>/dev/null || true

          # Commit and push only the updatePlugins.xml (small file)
          git add updatePlugins.xml
          git commit -m "Plugin v${VERSION}" --allow-empty
          git push origin main --force

      # Create a pull request
      - name: Create Pull Request
        if: ${{ steps.properties.outputs.changelog != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          git checkout ${{ github.event.release.tag_name }}

          VERSION="${{ github.event.release.tag_name }}"
          BRANCH="changelog-update-$VERSION"
          LABEL="release changelog"

          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          git checkout -b $BRANCH
          git commit -am "Changelog update - $VERSION"
          git push --set-upstream origin $BRANCH

          gh label create "$LABEL" \
            --description "Pull requests with release changelog update" \
            --force \
            || true

          gh pr create \
            --title "Changelog update - \`$VERSION\`" \
            --body "Current pull request contains patched \`CHANGELOG.md\` file for the \`$VERSION\` version." \
            --label "$LABEL" \
            --head $BRANCH
