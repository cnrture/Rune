# GitHub Actions Workflow for building and distributing the plugin internally.
# On GitHub Release: builds the plugin, uploads ZIP to release assets,
# and deploys a custom plugin repository to a public distribution repo.
# Requires PLUGIN_DEPLOY_TOKEN secret (classic PAT with repo scope).

name: Release
on:
  release:
    types: [prereleased, released]

jobs:

  release:
    name: Build & Deploy Plugin
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      # Set up Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      # Set environment variables
      - name: Export Properties
        id: properties
        shell: bash
        run: |
          CHANGELOG="$(cat << 'EOM' | sed -e 's/^[[:space:]]*$//g' -e '/./,$!d'
          ${{ github.event.release.body }}
          EOM
          )"

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          VERSION=$(grep -oP 'pluginVersion=\K.*' gradle.properties)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Update the Unreleased section with the current release note
      - name: Patch Changelog
        if: ${{ steps.properties.outputs.changelog != '' }}
        env:
          CHANGELOG: ${{ steps.properties.outputs.changelog }}
        run: |
          ./gradlew patchChangelog --release-note="$CHANGELOG"

      # Build the plugin
      - name: Build Plugin
        run: ./gradlew buildPlugin

      # Upload artifact as a release asset
      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} ./build/distributions/* --clobber

      # Find the exact ZIP filename from build output
      - name: Get ZIP filename
        id: zip
        run: |
          ZIP_NAME=$(ls build/distributions/*.zip | head -1 | xargs basename)
          echo "filename=$ZIP_NAME" >> $GITHUB_OUTPUT

      # Deploy updatePlugins.xml + plugin ZIP to public distribution repo
      # This allows Android Studio to fetch the plugin without authentication
      - name: Deploy to Distribution Repository
        env:
          VERSION: ${{ steps.properties.outputs.version }}
          ZIP_NAME: ${{ steps.zip.outputs.filename }}
          DEPLOY_TOKEN: ${{ secrets.PLUGIN_DEPLOY_TOKEN }}
        run: |
          SINCE_BUILD=$(grep -oP 'pluginSinceBuild=\K.*' gradle.properties)
          UNTIL_BUILD=$(grep -oP 'pluginUntilBuild=\K.*' gradle.properties)
          DIST_REPO="Teknasyon/intellij-ai-plugin-releases"

          # Prepare distribution content
          mkdir -p /tmp/plugin-dist

          # Copy the built plugin ZIP
          cp "build/distributions/${ZIP_NAME}" /tmp/plugin-dist/plugin.zip

          # Generate updatePlugins.xml
          cat > /tmp/plugin-dist/updatePlugins.xml << 'XMLEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <plugins>
            <plugin
                id="com.github.teknasyon.plugin"
                url="https://raw.githubusercontent.com/DIST_REPO_PLACEHOLDER/main/plugin.zip"
                version="VERSION_PLACEHOLDER">
              <name>Teknasyon IntelliJ AI Plugin</name>
              <description>Internal Teknasyon IntelliJ AI Plugin</description>
              <idea-version since-build="SINCE_PLACEHOLDER" until-build="UNTIL_PLACEHOLDER"/>
            </plugin>
          </plugins>
          XMLEOF

          # Replace placeholders
          sed -i "s|DIST_REPO_PLACEHOLDER|${DIST_REPO}|g" /tmp/plugin-dist/updatePlugins.xml
          sed -i "s|VERSION_PLACEHOLDER|${VERSION}|g" /tmp/plugin-dist/updatePlugins.xml
          sed -i "s|SINCE_PLACEHOLDER|${SINCE_BUILD}|g" /tmp/plugin-dist/updatePlugins.xml
          sed -i "s|UNTIL_PLACEHOLDER|${UNTIL_BUILD}|g" /tmp/plugin-dist/updatePlugins.xml

          # Push to distribution repo
          cd /tmp/plugin-dist
          git init -b main
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add .
          git commit -m "Plugin v${VERSION}"
          git remote add origin "https://x-access-token:${DEPLOY_TOKEN}@github.com/${DIST_REPO}.git"
          git push origin main --force

      # Create a pull request
      - name: Create Pull Request
        if: ${{ steps.properties.outputs.changelog != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd ${{ github.workspace }}
          git checkout ${{ github.event.release.tag_name }}

          VERSION="${{ github.event.release.tag_name }}"
          BRANCH="changelog-update-$VERSION"
          LABEL="release changelog"

          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          git checkout -b $BRANCH
          git commit -am "Changelog update - $VERSION"
          git push --set-upstream origin $BRANCH

          gh label create "$LABEL" \
            --description "Pull requests with release changelog update" \
            --force \
            || true

          gh pr create \
            --title "Changelog update - \`$VERSION\`" \
            --body "Current pull request contains patched \`CHANGELOG.md\` file for the \`$VERSION\` version." \
            --label "$LABEL" \
            --head $BRANCH
