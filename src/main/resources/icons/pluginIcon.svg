<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0F0A1A"/>
            <stop offset="100%" style="stop-color:#1A1030"/>
        </linearGradient>

        <linearGradient id="gemGrad" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" style="stop-color:#A78BFA"/>
            <stop offset="35%" style="stop-color:#7C3AED"/>
            <stop offset="70%" style="stop-color:#6D28D9"/>
            <stop offset="100%" style="stop-color:#4C1D95"/>
        </linearGradient>

        <linearGradient id="facetLeft" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.6"/>
            <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:0.3"/>
        </linearGradient>

        <linearGradient id="facetRight" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.5"/>
            <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.2"/>
        </linearGradient>

        <linearGradient id="shine" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%" style="stop-color:#E9D5FF;stop-opacity:0.9"/>
            <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0"/>
        </linearGradient>

        <linearGradient id="cyanAccent" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.8"/>
            <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0.2"/>
        </linearGradient>

        <filter id="glow">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="softGlow">
            <feGaussianBlur stdDeviation="15" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Koyu arka plan -->
    <rect width="512" height="512" rx="90" fill="url(#bgGrad)"/>

    <g transform="translate(256, 256)">

        <!-- Arka plan glow - kristalden yayılan ışık -->
        <ellipse cx="0" cy="20" rx="120" ry="80" fill="#7C3AED" opacity="0.08" filter="url(#softGlow)"/>

        <!-- ====== KRİSTAL / GEM FORMU ====== -->

        <!-- Alt üçgen - kristal alt kısmı -->
        <path d="M -90,15 L 90,15 L 0,180 Z" fill="url(#gemGrad)"/>

        <!-- Sol facet -->
        <path d="M -90,15 L 0,180 L 0,15 Z" fill="url(#facetLeft)"/>

        <!-- Sağ facet -->
        <path d="M 90,15 L 0,180 L 0,15 Z" fill="url(#facetRight)"/>

        <!-- Üst trapez - kristal üst kısmı (taç) -->
        <path d="M -90,15 L -55,-130 L 55,-130 L 90,15 Z" fill="url(#gemGrad)"/>

        <!-- Üst sol facet -->
        <path d="M -90,15 L -55,-130 L 0,-90 L 0,15 Z" fill="url(#facetLeft)"/>

        <!-- Üst sağ facet -->
        <path d="M 90,15 L 55,-130 L 0,-90 L 0,15 Z" fill="url(#facetRight)"/>

        <!-- Orta yatay çizgi - kesim hattı -->
        <line x1="-90" y1="15" x2="90" y2="15" stroke="#C4B5FD" stroke-width="1" opacity="0.5"/>

        <!-- İç çapraz kesim çizgileri -->
        <line x1="-55" y1="-130" x2="0" y2="15" stroke="#C4B5FD" stroke-width="0.8" opacity="0.3"/>
        <line x1="55" y1="-130" x2="0" y2="15" stroke="#C4B5FD" stroke-width="0.8" opacity="0.3"/>
        <line x1="0" y1="-90" x2="-90" y2="15" stroke="#C4B5FD" stroke-width="0.5" opacity="0.2"/>
        <line x1="0" y1="-90" x2="90" y2="15" stroke="#C4B5FD" stroke-width="0.5" opacity="0.2"/>

        <!-- Shine efekti - üst sol -->
        <path d="M -55,-130 L -20,-130 L -50,-40 Z" fill="url(#shine)" opacity="0.3"/>

        <!-- Kristal kenar glow -->
        <path d="M -90,15 L -55,-130 L 55,-130 L 90,15 L 0,180 Z"
              fill="none" stroke="url(#cyanAccent)" stroke-width="1.5" filter="url(#glow)" opacity="0.4"/>
    </g>
</svg>
